<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>競馬 割れ目検出アプリ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #333; }
.header { background: linear-gradient(135deg, #1a237e, #283593); color: white; padding: 16px; text-align: center; }
.header h1 { font-size: 18px; }
.container { max-width: 600px; margin: 0 auto; padding: 12px; }
.card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.card h2 { font-size: 14px; color: #666; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
.row { display: flex; gap: 8px; margin-bottom: 8px; }
.row label { font-size: 13px; color: #555; margin-bottom: 4px; display: block; }
.row > div { flex: 1; }
select, input[type=text], input[type=date] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: white; }
.btn-search { background: linear-gradient(135deg, #2e7d32, #43a047); color: white; margin-bottom: 8px; font-size: 14px; padding: 12px; }
.kaisai-info { font-size: 13px; padding: 8px 10px; border-radius: 8px; background: #f5f5f5; margin-bottom: 8px; min-height: 36px; }
.race-id-display { background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: 8px; padding: 10px; font-size: 13px; color: #2e7d32; text-align: center; margin-bottom: 8px; font-family: monospace; }
.btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
.btn-primary { background: linear-gradient(135deg, #1565c0, #1976d2); color: white; }
.btn-actions { background: linear-gradient(135deg, #e65100, #f57c00); color: white; margin-top: 8px; font-size: 14px; padding: 12px; }
#error { background: #ffebee; color: #c62828; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: none; font-size: 13px; }
#loading { text-align: center; padding: 20px; display: none; color: #666; }
#dataSource { font-size: 12px; color: #666; margin-bottom: 8px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #1a237e; color: white; padding: 8px 6px; text-align: center; }
td { padding: 8px 6px; text-align: center; border-bottom: 1px solid #f0f0f0; }
.alert-success { background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: 8px; padding: 12px; margin-top: 12px; color: #2e7d32; font-size: 14px; }
.alert-danger { background: #ffebee; border: 1px solid #ef9a9a; border-radius: 8px; padding: 12px; margin-top: 12px; color: #c62828; font-size: 14px; }
.portfolio-box { background: #f8f9fa; border-radius: 8px; padding: 12px; }
.bet-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 13px; flex-wrap: wrap; gap: 4px; }
.bet-amount { font-weight: bold; color: #1565c0; }
.odds-label { color: #666; font-size: 12px; }
.summary-row { display: flex; justify-content: space-between; padding-top: 10px; font-size: 13px; flex-wrap: wrap; gap: 4px; }
.profit { color: #2e7d32; font-weight: bold; }
.loss { color: #c62828; font-weight: bold; }
.toggle-row { display: flex; gap: 8px; margin-bottom: 12px; }
.toggle-btn { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 8px; background: white; font-size: 13px; cursor: pointer; }
.toggle-btn.active { background: #1a237e; color: white; border-color: #1a237e; }
</style>
</head>
<body>
<div class="header">
  <h1>🐴 競馬 割れ目検出アプリ</h1>
</div>
<div class="container">
  <div id="error"></div>
  <div class="card">
    <h2>📅 レース選択</h2>
    <div class="toggle-row">
      <button class="toggle-btn active" id="modeSimple" onclick="switchMode('simple')">📅 日付・競馬場から</button>
      <button class="toggle-btn" id="modeDirect" onclick="switchMode('direct')">🔢 race_id直接入力</button>
    </div>

    <div id="panelSimple">
      <div class="row">
        <div>
          <label>📅 日付</label>
          <input type="date" id="raceDate">
        </div>
        <div>
          <label>🏟 競馬場</label>
          <select id="raceVenue">
            <option value="01">札幌</option>
            <option value="02">函館</option>
            <option value="03">福島</option>
            <option value="04">新潟</option>
            <option value="05">東京</option>
            <option value="06" selected>中山</option>
            <option value="07">中京</option>
            <option value="08">京都</option>
            <option value="09">阪神</option>
            <option value="10">小倉</option>
          </select>
        </div>
      </div>
      <button class="btn btn-search" id="searchKaisai">🔍 開催情報を検索</button>
      <div class="kaisai-info" id="kaisaiInfo"></div>
      <div class="row">
        <div>
          <label>🏁 レース番号</label>
          <select id="raceNum">
            <option value="01">1R</option><option value="02">2R</option><option value="03">3R</option>
            <option value="04">4R</option><option value="05">5R</option><option value="06">6R</option>
            <option value="07">7R</option><option value="08">8R</option><option value="09">9R</option>
            <option value="10">10R</option><option value="11" selected>11R</option><option value="12">12R</option>
          </select>
        </div>
      </div>
      <div class="race-id-display" id="raceIdPreview">race_id: 計算中...</div>
      <button class="btn btn-actions" onclick="triggerActions()">⚡ GitHub Actionsでオッズ取得</button>
    </div>

    <div id="panelDirect" style="display:none">
      <label style="font-size:13px;color:#555;margin-bottom:4px;display:block">race_id（12桁）</label>
      <input type="text" id="raceIdDirect" placeholder="例: 202506050811" maxlength="12" style="font-family:monospace;letter-spacing:2px;">
    </div>
  </div>

  <div class="card">
    <button class="btn btn-primary" id="fetchOdds">📊 オッズ分析</button>
  </div>

  <div id="loading">⏳ オッズ取得中...</div>

  <div id="outputSection" style="display:none">
    <div class="card">
      <div id="dataSource"></div>
      <div id="oddsResult"></div>
    </div>
    <div id="portfolioData" class="card" style="display:none">
      <h2>💰 推奨ポートフォリオ</h2>
      <div id="portfolioInfo"></div>
      <button class="btn btn-primary" id="goToUmaca" style="margin-top:12px">🏧 ウマカスマートで購入</button>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
