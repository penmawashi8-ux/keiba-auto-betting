<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>競馬馬券自動購入アプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🐎 競馬馬券自動購入アプリ</h1>
        
        <div class="input-section">
            <h2>ステップ1: レース情報を入力</h2>
            
            <div class="form-group">
                <label for="raceDate">開催日付:</label>
                <input type="text" id="raceDate" value="2026-03-01" placeholder="YYYY-MM-DD">
            </div>
            
            <div class="form-group">
                <label for="racePlace">開催地:</label>
                <select id="racePlace">
                    <option value="">選択してください</option>
                    <option value="06">中山</option>
                    <option value="09">阪神</option>
                    <option value="10">小倉</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="raceNumber">レース番号 (1-12):</label>
                <input type="number" id="raceNumber" min="1" max="12" value="1">
            </div>
            
            <button id="fetchOdds" class="btn-primary">オッズを取得</button>
        </div>

        <div id="error" class="error" style="display: none;"></div>
        
        <div id="loading" class="loading" style="display: none;">
            ⏳ オッズを取得中...
        </div>

        <div id="outputSection" style="display: none;">
            <h2>ステップ2: オッズ分析結果</h2>
            <div id="oddsResult"></div>
            
            <div id="portfolioData" style="display: none;">
                <h3>📋 投票内容</h3>
                <div id="portfolioInfo"></div>
                <button id="goToUmaca" class="btn-secondary">ウマカスマートへ</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
