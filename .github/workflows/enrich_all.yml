name: Enrich All Years (Parallel)

on:
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        year: [2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests --quiet

      - name: Enrich ${{ matrix.year }}
        run: |
          INPUT="backtest_${{ matrix.year }}.csv"
          if [ ! -f "$INPUT" ] && [ "${{ matrix.year }}" = "2025" ]; then
            INPUT="backtest_result.csv"
          fi
          python3 enrich.py "$INPUT" backtest_${{ matrix.year }}_enriched.csv

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: enriched-${{ matrix.year }}
          path: backtest_${{ matrix.year }}_enriched.csv

  merge:
    runs-on: ubuntu-latest
    needs: enrich
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: enriched-*
          merge-multiple: true

      - name: Merge CSVs
        run: python3 merge.py enriched

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add backtest_*_enriched.csv backtest_all_enriched.csv
          git diff --staged --quiet || git commit -m "enrich all years (parallel) + merge"
          git push
