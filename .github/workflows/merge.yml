name: Merge Backtest CSVs

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'raw or enriched'
        required: true
        default: 'enriched'

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Merge CSVs
        run: python3 merge.py ${{ github.event.inputs.mode }}

      - name: Commit result
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add backtest_all*.csv
          git diff --staged --quiet || git commit -m "merge ${{ github.event.inputs.mode }}"
          git push
