name: Merge Backtest CSVs

on:
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Merge CSVs
        run: python3 merge.py

      - name: Commit result
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add backtest_all.csv
          git diff --staged --quiet || git commit -m "merge all backtest CSVs"
          git push
