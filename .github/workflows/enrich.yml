name: Enrich

on:
  workflow_dispatch:
    inputs:
      year:
        description: 'year (e.g. 2024)'
        required: true
        default: '2024'

jobs:
  enrich:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests --quiet

      - name: Run enrich
        run: python3 enrich.py backtest_${{ github.event.inputs.year }}.csv backtest_${{ github.event.inputs.year }}_enriched.csv

      - name: Commit result
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add backtest_${{ github.event.inputs.year }}_enriched.csv
          git diff --staged --quiet || git commit -m "enrich ${{ github.event.inputs.year }}"
          git push
