name: fetch-odds

on:
  workflow_dispatch:
    inputs:
      race_id:
        description: 'race_id'
        required: true
        type: string

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - run: python fetch_odds.py "${{ github.event.inputs.race_id }}"

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add odds.json
          git diff --staged --quiet || git commit -m "update odds"
          git push
