name: fetch odds

on:
workflow_dispatch:
inputs:
race_id:
description: ‘race_id 12digits e.g. 202506050811’
required: true
default: ‘202506050811’
schedule:
- cron: ‘0 5 * * 6,0’

jobs:
fetch:
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v4
- uses: actions/setup-python@v5
with:
python-version: ‘3.12’
- run: pip install requests
- run: python fetch_odds.py “${{ github.event.inputs.race_id || ‘202506050811’ }}”
- run: |
git config user.name “github-actions”
git config user.email “actions@github.com”
git add odds.json
git diff –cached –quiet || git commit -m “update odds.json”
git push
