name: Fetch Odds

on:
  workflow_dispatch:
    inputs:
      race_id:
        description: 'Race ID (12 digits, manual run)'
        required: false
  schedule:
    - cron: '*/5 1,2,3,4,5,6,7 * * 6,0'

jobs:
  fetch-kaisai:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch kaisai info and save JSON
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, datetime, re

          today = datetime.date.today()
          days_ahead = []
          for i in range(-7, 14):
            d = today + datetime.timedelta(days=i)
            if d.weekday() in [5, 6]:
              days_ahead.append(d.strftime('%Y%m%d'))

          result = {}
          for yyyymmdd in days_ahead:
            result[yyyymmdd] = {}
            url = f'https://race.sp.netkeiba.com/?pid=race_list&kaisai_date={yyyymmdd}'
            try:
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0 (iPhone; CPU iPhone OS 15_0 like Mac OS X)'})
              with urllib.request.urlopen(req, timeout=10) as r:
                html = r.read().decode('utf-8', errors='ignore')
              yyyy = yyyymmdd[:4]
              race_ids = re.findall(r'race_id=(\d{12})', html)
              idx = html.find(yyyymmdd)
              if idx >= 0:
                block = html[idx:idx+5000]
                block_ids = re.findall(r'race_id=(\d{12})', block)
                for rid in block_ids:
                  if rid[:4] == yyyy:
                    vc = rid[4:6]
                    times = rid[6:8]
                    day = rid[8:10]
                    if vc not in result[yyyymmdd]:
                      result[yyyymmdd][vc] = {'times': times, 'day': day, 'sample_race_id': rid}
                      print(f'Found: {yyyymmdd} vc={vc} times={times} day={day} rid={rid}')
              else:
                print(f'Date {yyyymmdd} not found in HTML')
                for rid in race_ids:
                  if rid[:4] == yyyy:
                    vc = rid[4:6]
                    times = rid[6:8]
                    day = rid[8:10]
                    if vc not in result[yyyymmdd]:
                      result[yyyymmdd][vc] = {'times': times, 'day': day, 'sample_race_id': rid}
            except Exception as e:
              print(f'Error {yyyymmdd}: {e}')

          with open('kaisai.json', 'w') as f:
            json.dump(result, f, ensure_ascii=False, indent=2)
          print('Done:', json.dumps(result, ensure_ascii=False))
          PYEOF

      - name: Auto detect and fetch pre-race odds
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.race_id == '')
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, datetime, re, os

          now_utc = datetime.datetime.utcnow()
          now_jst = now_utc + datetime.timedelta(hours=9)
          today = now_jst.strftime('%Y%m%d')
          now_min = now_jst.hour * 60 + now_jst.minute
          ntfy_topic = os.environ.get('NTFY_TOPIC', 'keiba-alert-penmawashi')

          print(f'JST: {now_jst.strftime("%H:%M")} ({now_min}min)')

          # 10:00-16:30ã®ã¿å®è¡
          if now_min < 600 or now_min > 990:
            print('Outside race hours, skipping')
            exit(0)

          with open('kaisai.json') as f:
            kaisai = json.load(f)

          if today not in kaisai or not kaisai[today]:
            print(f'No kaisai for {today}')
            exit(0)

          # å½æ¥ã®å¨ã¬ã¼ã¹çºèµ°æå»ãRaceList_NameBoxãã­ãã¯ããåå¾
          races = []
          for vc, info in kaisai[today].items():
            sample_id = info.get('sample_race_id', '')
            if not sample_id:
              continue
            url = f'https://race.netkeiba.com/race/list.html?kaisai_date={today}'
            try:
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0', 'Referer': 'https://race.netkeiba.com/'})
              with urllib.request.urlopen(req, timeout=10) as r:
                html = r.read().decode('utf-8', errors='ignore')

              blocks = re.split(r'(?=<div class="RaceList_NameBox")', html)
              for block in blocks:
                rid = re.search(r'MyRace-Item-(\d{12})', block)
                time_match = re.search(r'(\d{2}:\d{2})çºèµ°', block)
                if rid and time_match:
                  h, m = map(int, time_match.group(1).split(':'))
                  start_min = h * 60 + m
                  races.append({'race_id': rid.group(1), 'start_min': start_min, 'time_str': time_match.group(1)})
                  print(f'Race: {rid.group(1)} at {time_match.group(1)}')
            except Exception as e:
              print(f'Error fetching race list: {e}')

          if not races:
            print('No races found with time info')
            exit(0)

          # çºèµ°ã¾ã§5ã10åã®ã¬ã¼ã¹ãæ¤åº
          target_races = [r for r in races if 5 <= (r['start_min'] - now_min) <= 10]
          print(f'Target races (5-10min before): {target_races}')

          for race in target_races:
            race_id = race['race_id']
            print(f'Fetching odds for {race_id} (starts {race["time_str"]})')

            try:
              url = f'https://race.netkeiba.com/api/api_get_jra_odds.html?race_id={race_id}&type=1&action=update'
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0', 'Referer': 'https://race.netkeiba.com/'})
              with urllib.request.urlopen(req, timeout=10) as r:
                data = json.loads(r.read())

              if data.get('status') not in ['yoso', 'result', 'ok']:
                print(f'Odds not ready: {data.get("status")}')
                continue

              odds_obj = data.get('data', {}).get('odds', {}).get('1', {})
              if not odds_obj:
                print('No odds data')
                continue

              odds_arr = sorted([
                {'horse_num': int(k), 'odds': float(v[0]), 'popular': int(v[2])}
                for k, v in odds_obj.items() if v[0]
              ], key=lambda x: x['popular'])

              if len(odds_arr) < 4:
                continue

              top3 = odds_arr[:3]
              rest = odds_arr[3:]
              avg = lambda a: sum(x['odds'] for x in a) / len(a)
              spread = avg(rest) / avg(top3)
              print(f'Spread: {spread:.2f}')

              # å©çãåºãæå¤§é ­æ°ãè¨ç®
              best_n = 0
              for n in range(len(odds_arr), 0, -1):
                top = odds_arr[:n]
                inv = [1/o['odds'] for o in top]
                sum_inv = sum(inv)
                bets = [max(100, round(inv[i]/sum_inv*1000/100)*100) for i in range(n)]
                total = sum(bets)
                min_pay = min(round(bets[i]*top[i]['odds']) for i in range(n))
                if min_pay > total:
                  best_n = n
                  break

              pick_ratio = best_n / len(odds_arr)
              cond_a = pick_ratio >= 0.4
              cond_b = spread >= 3.0

              if spread >= 2.0 and (cond_a or cond_b):
                top3_str = ' '.join([f'{o["horse_num"]}ban({o["odds"]}x)' for o in top3])
                reasons = []
                if cond_a: reasons.append(f'{best_n}/{len(odds_arr)}heads({round(pick_ratio*100)}%)')
                if cond_b: reasons.append(f'spread{spread:.2f}')
                msg = f'Wareme! {race_id} start:{race["time_str"]} {",".join(reasons)} top3:{top3_str}'
                print(f'Notifying: {msg}')

                data['race_id'] = race_id
                with open('odds.json', 'w') as f:
                  json.dump(data, f, ensure_ascii=False)

                ntfy_url = f'https://ntfy.sh/{ntfy_topic}'
                notify_req = urllib.request.Request(
                  ntfy_url,
                  data=msg.encode('utf-8'),
                  headers={'Title': 'Keiba Wareme','Click': f'https://penmawashi8-ux.github.io/keiba-auto-betting/?race_id={race_id}&start={race["time_str"]}', 'Priority': 'high', 'Tags': 'horse,money_with_wings'},
                  method='POST'
                )
                with urllib.request.urlopen(notify_req, timeout=10) as r:
                  print(f'ntfy sent: {r.status}')
              else:
                print(f'No signal: spread={spread:.2f} ratio={pick_ratio:.2f}')

            except Exception as e:
              print(f'Error for {race_id}: {e}')
          PYEOF

      - name: Manual fetch odds
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.race_id != ''
        env:
          RACE_ID: ${{ github.event.inputs.race_id }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os

          race_id = os.environ.get('RACE_ID', '')
          if not race_id or len(race_id) != 12:
            print('Invalid race_id:', race_id)
            exit(0)

          horse_names = {}
          try:
            url_init = f'https://race.netkeiba.com/api/api_get_jra_odds.html?race_id={race_id}&type=1&action=init'
            req = urllib.request.Request(url_init, headers={'User-Agent': 'Mozilla/5.0', 'Referer': 'https://race.netkeiba.com/'})
            with urllib.request.urlopen(req, timeout=10) as r:
              init_data = json.loads(r.read())
            horses = init_data.get('data', {}).get('horses') or init_data.get('horses')
            if horses:
              for h in horses:
                num = str(h.get('horse_num') or h.get('num') or '')
                name = h.get('horse_name') or h.get('name') or ''
                if num:
                  horse_names[num] = name
              print('Horses:', horse_names)
          except Exception as e:
            print('Horse fetch error:', e)

          url = f'https://race.netkeiba.com/api/api_get_jra_odds.html?race_id={race_id}&type=1&action=update'
          try:
            req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0', 'Referer': 'https://race.netkeiba.com/'})
            with urllib.request.urlopen(req, timeout=10) as r:
              data = json.loads(r.read())
            if 'data' in data and 'odds' in data['data'] and '1' in data['data']['odds']:
              for num, odds_arr in data['data']['odds']['1'].items():
                if num in horse_names:
                  odds_arr.append(horse_names[num])
            data['race_id'] = race_id
            with open('odds.json', 'w') as f:
              json.dump(data, f, ensure_ascii=False)
            print('odds.json saved')
          except Exception as e:
            print('Error:', e)
            with open('odds.json', 'w') as f:
              json.dump({'error': str(e)}, f)
          PYEOF

      - name: Commit files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add kaisai.json odds.json
          git diff --staged --quiet || git commit -m "update odds and kaisai"
          git push
