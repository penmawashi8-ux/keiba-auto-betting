name: Fetch Odds

on:
  workflow_dispatch:
    inputs:
      race_id:
        description: 'Race ID (12 digits)'
        required: true

jobs:
  fetch-kaisai:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch kaisai info and save JSON
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, datetime
          from concurrent.futures import ThreadPoolExecutor, as_completed

          VENUE_CODES = ['01','02','03','04','05','06','07','08','09','10']
          today = datetime.date.today()
          days_ahead = []
          for i in range(-7, 14):
            d = today + datetime.timedelta(days=i)
            if d.weekday() in [5, 6]:
              days_ahead.append(d.strftime('%Y%m%d'))

          def check_race(yyyymmdd, vc, times, day):
            rid = yyyymmdd[:4] + vc + str(times).zfill(2) + str(day).zfill(2) + '01'
            url = f'https://race.netkeiba.com/api/api_get_jra_odds.html?race_id={rid}&type=1&action=update'
            try:
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=5) as r:
                data = json.loads(r.read())
                if data and data.get('data'):
                  odds = data['data'].get('odds', {})
                  # 単勝オッズが実際に存在するか確認
                  if odds and len(odds.get('1', {})) > 0:
                    return (yyyymmdd, vc, times, day)
            except:
              pass
            return None

          result = {}
          for yyyymmdd in days_ahead:
            result[yyyymmdd] = {}

          # 並列で全組み合わせをチェック
          tasks = []
          for yyyymmdd in days_ahead:
            for vc in VENUE_CODES:
              for times in range(1, 7):
                for day in range(1, 13):
                  tasks.append((yyyymmdd, vc, times, day))

          with ThreadPoolExecutor(max_workers=20) as ex:
            futures = {ex.submit(check_race, *t): t for t in tasks}
            for f in as_completed(futures):
              r = f.result()
              if r:
                yyyymmdd, vc, times, day = r
                # 同じ日・会場で既に見つかっていたら小さい方を採用
                if vc not in result[yyyymmdd]:
                  result[yyyymmdd][vc] = {'times': str(times).zfill(2), 'day': str(day).zfill(2)}
                  print(f'Found: {yyyymmdd} vc={vc} times={times} day={day}')

          with open('kaisai.json', 'w') as f:
            json.dump(result, f, ensure_ascii=False, indent=2)
          print('Done:', json.dumps(result, ensure_ascii=False))
          PYEOF
      - name: Fetch odds for race
        env:
          RACE_ID: ${{ github.event.inputs.race_id }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os

          race_id = os.environ.get('RACE_ID', '')
          if not race_id or len(race_id) != 12:
            print('Invalid race_id:', race_id)
            exit(0)

          url = f'https://race.netkeiba.com/api/api_get_jra_odds.html?race_id={race_id}&type=1&action=update'
          try:
            req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
            with urllib.request.urlopen(req, timeout=10) as r:
              data = json.loads(r.read())
              with open('odds.json', 'w') as f:
                json.dump(data, f, ensure_ascii=False)
              print('odds.json saved')
          except Exception as e:
            print('Error:', e)
            with open('odds.json', 'w') as f:
              json.dump({'error': str(e)}, f)
          PYEOF
      - name: Commit files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add kaisai.json odds.json
          git diff --staged --quiet || git commit -m "update odds and kaisai"
          git push
