name: Fetch Odds

on:
  workflow_dispatch:
    inputs:
      race_id:
        description: 'Race ID (12 digits, manual run)'
        required: false
  schedule:
    - cron: '*/5 1,2,3,4,5,6,7 * * 6,0'

jobs:
  fetch-kaisai:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch kaisai and odds
        env:
          RACE_ID: ${{ github.event.inputs.race_id }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, datetime, re, os

          race_id_input = os.environ.get('RACE_ID', '')
          ntfy_topic = os.environ.get('NTFY_TOPIC', 'keiba-alert-penmawashi')
          now_utc = datetime.datetime.utcnow()
          now_jst = now_utc + datetime.timedelta(hours=9)
          today = now_jst.strftime('%Y%m%d')
          now_min = now_jst.hour * 60 + now_jst.minute
          print(f'JST: {now_jst.strftime("%H:%M")} race_id_input={race_id_input}')

          # kaisai.json update
          days = []
          for i in range(-7, 14):
            d = datetime.date.today() + datetime.timedelta(days=i)
            if d.weekday() in [5, 6]:
              days.append(d.strftime('%Y%m%d'))

          result = {}
          for yyyymmdd in days:
            result[yyyymmdd] = {}
            url = f'https://race.netkeiba.com/top/race_list.html?kaisai_date={yyyymmdd}'
            try:
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0 (iPhone; CPU iPhone OS 15_0 like Mac OS X)'})
              with urllib.request.urlopen(req, timeout=10) as r:
                html = r.read().decode('utf-8', errors='ignore')
              for rid in re.findall(r'race_id=(\d{12})', html):
                if rid[:4] == yyyymmdd[:4]:
                  vc = rid[4:6]
                  if vc not in result[yyyymmdd]:
                    result[yyyymmdd][vc] = {'times': rid[6:8], 'day': rid[8:10], 'sample_race_id': rid}
                    print(f'kaisai: {yyyymmdd} vc={vc} rid={rid}')
            except Exception as e:
              print(f'kaisai error {yyyymmdd}: {e}')

          with open('kaisai.json', 'w') as f:
            json.dump(result, f, ensure_ascii=False, indent=2)
          print('kaisai.json saved')

          # odds fetch
          if race_id_input and len(race_id_input) == 12:
            # manual
            target_races = [race_id_input]
          else:
            # auto: 5-10min before start
            if now_min < 600 or now_min > 990:
              print('Outside hours')
              exit(0)
            if today not in result or not result[today]:
              print('No kaisai today')
              exit(0)
            target_races = []
            for vc, info in result[today].items():
              base = info['sample_race_id'][:10]
              for rn in range(1, 13):
                target_races.append(base + str(rn).zfill(2))

          saved = False
          for race_id in target_races:
            try:
              horse_names = {}
              try:
                url_init = f'https://race.netkeiba.com/api/api_get_jra_odds.html?race_id={race_id}&type=1&action=init'
                req = urllib.request.Request(url_init, headers={'User-Agent': 'Mozilla/5.0', 'Referer': 'https://race.netkeiba.com/'})
                with urllib.request.urlopen(req, timeout=10) as r:
                  init_data = json.loads(r.read())
                horses = init_data.get('data', {}).get('horses') or []
                for h in horses:
                  num = str(h.get('horse_num') or h.get('num') or '')
                  name = h.get('horse_name') or h.get('name') or ''
                  if num: horse_names[num] = name
              except: pass

              url = f'https://race.netkeiba.com/api/api_get_jra_odds.html?race_id={race_id}&type=1&action=update'
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0', 'Referer': 'https://race.netkeiba.com/'})
              with urllib.request.urlopen(req, timeout=10) as r:
                data = json.loads(r.read())

              status = data.get('status', '')
              print(f'{race_id} status={status}')

              if status not in ['yoso', 'result', 'ok', 'middle']:
                continue

              if 'data' in data and 'odds' in data['data'] and '1' in data['data']['odds']:
                for num, arr in data['data']['odds']['1'].items():
                  if num in horse_names and len(arr) < 4:
                    arr.append(horse_names[num])

              data['race_id'] = race_id
              with open('odds.json', 'w') as f:
                json.dump(data, f, ensure_ascii=False)
              print(f'odds.json saved for {race_id}')
              saved = True

              if race_id_input:
                break

              # notify if wareme
              odds_obj = data.get('data', {}).get('odds', {}).get('1', {})
              if odds_obj:
                odds_arr = sorted([
                  {'horse_num': int(k), 'odds': float(v[0]), 'popular': int(v[2])}
                  for k, v in odds_obj.items() if v and v[0]
                ], key=lambda x: x['popular'])
                if len(odds_arr) >= 4:
                  top3 = odds_arr[:3]
                  rest = odds_arr[3:]
                  spread = (sum(x['odds'] for x in rest)/len(rest)) / (sum(x['odds'] for x in top3)/len(top3))
                  best_n = 0
                  for n in range(len(odds_arr), 0, -1):
                    top = odds_arr[:n]
                    inv = [1/o['odds'] for o in top]
                    s = sum(inv)
                    bets = [max(100, round(inv[i]/s*1000/100)*100) for i in range(n)]
                    if min(round(bets[i]*top[i]['odds']) for i in range(n)) > sum(bets):
                      best_n = n
                      break
                  pick_ratio = best_n / len(odds_arr)
                  if spread >= 2.0 and (pick_ratio >= 0.4 or spread >= 3.0):
                    msg = f'Wareme! {race_id} spread={spread:.2f} ratio={pick_ratio:.0%}'
                    try:
                      notify_req = urllib.request.Request(f'https://ntfy.sh/{ntfy_topic}', data=msg.encode(), headers={'Title':'Keiba','Priority':'high'}, method='POST')
                      with urllib.request.urlopen(notify_req, timeout=10) as r:
                        print(f'ntfy: {r.status}')
                    except Exception as e:
                      print(f'ntfy error: {e}')

            except Exception as e:
              print(f'Error {race_id}: {e}')

          if not saved:
            print('No odds saved')
          PYEOF

      - name: Commit files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add kaisai.json odds.json
          git diff --staged --quiet || git commit -m "update odds and kaisai"
          git push
