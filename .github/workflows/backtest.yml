name: Backtest

on:
  workflow_dispatch:
    inputs:
      year:
        description: '対象年 (例: 2024)'
        required: true
        default: '2024'

jobs:
  backtest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests --quiet

      - name: Run backtest
        run: python3 backtest.py ${{ github.event.inputs.year }}0101 ${{ github.event.inputs.year }}1231 backtest_${{ github.event.inputs.year }}.csv

      - name: Commit result
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add backtest_${{ github.event.inputs.year }}.csv
          git diff --staged --quiet || git commit -m "backtest ${{ github.event.inputs.year }}"
          git push
