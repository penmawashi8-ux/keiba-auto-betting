name: Backtest

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: '開始日 (YYYYMMDD)'
        required: false
        default: ''
      end_date:
        description: '終了日 (YYYYMMDD)'
        required: false
        default: ''

jobs:
  backtest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Debug race ID format
        run: |
          pip install requests --quiet
          python3 debug_raceid.py

      - name: Run backtest
        run: |
          python3 backtest.py "${{ github.event.inputs.start_date }}" "${{ github.event.inputs.end_date }}"

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add backtest_result.csv backtest_summary.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "backtest result"
          git push
