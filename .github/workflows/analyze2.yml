name: Analyze2

on:
  workflow_dispatch:

jobs:
  analyze2:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install requests
        run: pip install requests --quiet

      - name: Enrich CSV with race metadata
        run: python3 enrich.py backtest_result.csv enriched.csv

      - name: Analyze conditions
        run: python3 analyze2.py enriched.csv

      - name: Commit enriched CSV
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add enriched.csv
          git diff --staged --quiet || git commit -m "add enriched.csv"
          git push
